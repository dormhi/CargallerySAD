<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CarGallery - Browse, filter, and reserve rental vehicles online.">
  <title>CarGallery — Car Rental System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="container navbar__inner">
      <a href="#/" class="navbar__logo">
        <span class="navbar__logo-icon">🚗</span>
        <span class="navbar__logo-text">CarGallery</span>
      </a>
      <ul class="navbar__links" id="navbar-links">
        <li><a href="#/" class="navbar__link active" data-page="home">Home</a></li>
        <li><a href="#/admin" class="navbar__link" data-page="admin">Admin</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main" id="app">
    <!-- Pages will be rendered here by the SPA router -->
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-title"></h3>
        <button class="modal__close" id="modal-close">&times;</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/components/Toast.js"></script>
  <script src="/js/components/Modal.js"></script>
  <script src="/js/components/Navbar.js"></script>
  <script src="/js/components/VehicleCard.js"></script>
  <script src="/js/components/VehicleFilter.js"></script>
  <script src="/js/pages/HomePage.js"></script>
  <script src="/js/pages/VehicleDetailPage.js"></script>
  <script src="/js/pages/ReservationPage.js"></script>
  <script src="/js/pages/AdminPage.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
